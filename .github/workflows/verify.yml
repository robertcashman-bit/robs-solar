name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m venv .venv && . .venv/bin/activate && pip install -e ".[dev]"
      - run: . .venv/bin/activate && ruff check .
      - run: . .venv/bin/activate && pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm --workspace frontend run lint
      - run: npm --workspace frontend run typecheck
      - run: npm --workspace frontend run test

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        working-directory: backend
        run: python -m venv .venv && . .venv/bin/activate && pip install -e ".[dev]"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: CI=true npm --workspace frontend run test:e2e
        env:
          ADAPTER_MODE: simulator
          READ_ONLY: "false"
          ENABLE_LIVE_WRITES: "true"
