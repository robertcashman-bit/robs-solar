name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m venv .venv && . .venv/bin/activate && pip install -r requirements.txt -r requirements-dev.txt
      - run: . .venv/bin/activate && ruff check .
      - run: . .venv/bin/activate && pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend
        working-directory: backend
        run: python -m venv .venv && . .venv/bin/activate && pip install -r requirements.txt -r requirements-dev.txt
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: CI=true npm run test:e2e
        env:
          ADAPTER_MODE: simulator
          READ_ONLY: "false"
          ENABLE_LIVE_WRITES: "true"
