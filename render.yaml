# Render blueprint — connect this repo at https://dashboard.render.com/blueprint
# and Render will create the always-on API service with persistent SQLite storage.
services:
  - type: web
    name: robs-solar-api
    runtime: docker
    plan: starter
    region: frankfurt
    branch: main
    rootDir: backend
    dockerfilePath: ./deploy/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: robs-solar-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////data/robs_solar.db
      - key: SECRET_KEY
        generateValue: true
      - key: READ_ONLY
        value: "true"
      - key: ENABLE_LIVE_WRITES
        value: "false"
      - key: ADAPTER_MODE
        value: sunsynk_connect
      - key: METRICS_SAMPLER_ENABLED
        value: "true"
      - key: METRICS_SAMPLE_INTERVAL_SECONDS
        value: "60"
      - key: AUTO_SCHEDULE_ENABLED
        value: "false"
      - key: TARIFF_TIMEZONE
        value: Europe/London
      - key: PEAK_IMPORT_GUARD_ENABLED
        value: "true"
      - key: SUNSYNK_ENABLE_UNVERIFIED_WRITES
        value: "false"
      - key: AI_ENABLED
        value: "true"
      # Set these in the Render dashboard (or via scripts/push-render-secrets.sh):
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: VIEWER_USERNAME
        sync: false
      - key: VIEWER_PASSWORD
        sync: false
      - key: SUNSYNK_USERNAME
        sync: false
      - key: SUNSYNK_PASSWORD
        sync: false
      - key: SUNSYNK_PLANT_ID
        sync: false
      - key: SUNSYNK_INVERTER_SN
        sync: false
      - key: OCTOPUS_API_KEY
        sync: false
      - key: OCTOPUS_ACCOUNT_NUMBER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
